<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代辦事項</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="todo">
    <div class="site-shell">
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="開啟選單" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <aside class="sidebar" data-sidebar></aside>
        <div class="clock-box" data-clock></div>

        <main class="todo-page" data-todo-app>
            <section class="todo-scene">
                <section>
                    <h1 class="todo-left-title">今天要做什麼呢?</h1>
                    <div class="todo-input-row">
                        <input class="todo-scene-input" type="text" maxlength="40" data-task-title>
                        <button class="todo-scene-add primary-btn" type="button" data-add-task>輸入</button>
                    </div>
                </section>

                <section class="todo-paper">
                    <h2 class="todo-paper-title">To Do List</h2>
                    <ul class="todo-paper-list" data-task-list></ul>
                    <div class="todo-paper-empty" data-task-empty></div>
                    <div class="todo-paper-actions">
                        <button class="todo-clear-btn secondary-btn" type="button" data-clear-tasks>全部清空</button>
                    </div>
                </section>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
