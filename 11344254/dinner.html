<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐吃什麼</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="dinner">
    <div class="site-shell">
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="開啟選單" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <aside class="sidebar" data-sidebar></aside>
        <div class="clock-box" data-clock></div>

        <main class="meal-page" data-wheel-app data-wheel-key="dinner" data-wheel-title="晚餐吃什麼？">
            <section class="meal-layout">
                <section>
                    <h1 class="meal-left-title">晚餐吃什麼？</h1>
                    <div class="meal-input-card">
                        <div class="meal-input-top">
                            <input class="meal-text-input" type="text" maxlength="12" placeholder="" data-wheel-input>
                            <button class="meal-submit-btn primary-btn" type="button" data-wheel-add>輸入</button>
                        </div>
                        <ul class="meal-option-list" data-wheel-options></ul>
                    </div>
                </section>

                <section class="meal-wheel-panel">
                    <button class="meal-spin-btn primary-btn" type="button" data-spin>開始抽選</button>
                    <div class="meal-wheel-wrap">
                        <div class="meal-wheel-arrow" aria-hidden="true"></div>
                        <div class="meal-wheel" data-wheel></div>
                    </div>
                    <div class="meal-picked" data-wheel-result>我要全部!</div>
                </section>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
